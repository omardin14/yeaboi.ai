# Dependabot keeps dependencies and CI actions patched automatically.
# Python updates are driven off pyproject.toml + uv.lock; grouped so a routine
# patch/minor bump arrives as one reviewable PR instead of many.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      # auto-version.yml honours semver:* labels — a pip bump gets a patch
      # version bump on the PR branch, so merging publishes a release that
      # actually ships the (potentially security-relevant) dependency update.
      - "semver:patch"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-patch-minor:
        update-types:
          - "minor"
          - "patch"
      # CVE-driven security updates arrive as one grouped PR too.
      python-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      # All action bumps in one weekly PR instead of one PR per action.
      actions-all:
        patterns:
          - "*"
