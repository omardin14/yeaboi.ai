# Feedback remediation — nightly triage of new GitHub issues.
#
# Sibling to backlog-groomer, but with teeth: where the groomer only *nominates*
# candidates, this one actually routes actionable bugs into the existing
# `claude-implement` pathway (which opens a normal fix PR through CI + review +
# human merge). It is the "Claude kicks off Claude" hand-off — composed through
# the proven implement workflow rather than duplicating checkout/push logic.
#
# Auth: runs on the hosted claude-code-action with the App's
# CLAUDE_CODE_OAUTH_TOKEN — the SAME subscription-backed token as every other
# Claude workflow here. (An earlier draft used the Python Claude Agent SDK, which
# is forbidden from subscription auth and would have forced a metered
# ANTHROPIC_API_KEY; this rewrite avoids that — no extra billing, no new secret.)
#
# Safety: `issues: write` only — it structurally cannot touch PRs or merge.
# Idempotent via the `triaged` label cursor, caps `claude-implement` at 3/run,
# skips bot authors, and the workflow_dispatch path defaults to dry-run (which
# also drops all write tools, so a dry run physically cannot change anything).

name: Feedback Remediation

on:
  schedule:
    - cron: "0 2 * * *" # nightly 02:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log intended actions without changing anything"
        type: boolean
        required: false
        default: true

concurrency:
  group: feedback-remediation
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # label / comment / maintain the digest issue
  id-token: write # claude-code-action OIDC

jobs:
  triage:
    name: Triage new feedback issues
    runs-on: ubuntu-latest
    env:
      # Scheduled runs act for real; manual runs default to dry-run.
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - name: Collect fresh issues (exclude bots + already-triaged)
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          # "Fresh feedback" = open, human-authored, none of the cursor /
          # bookkeeping labels present. Mirrors the old triage SKIP sets.
          gh issue list --state open --limit 200 \
            --json number,title,labels,author,createdAt,body \
            --jq '[.[]
              | select(.author.login != "github-actions[bot]")
              | select(.author.login != "dependabot[bot]")
              | select(([.labels[].name]
                  | any(. == "triaged" or . == "groomer-report" or . == "flaky-test"
                        or . == "ci-sentinel" or . == "ci-red-main")) | not)]' > issues.json
          COUNT=$(python -c "import json;print(len(json.load(open('issues.json'))))")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::$COUNT fresh issue(s) to triage (dry_run=$DRY_RUN)."

      - name: Triage with Claude
        if: steps.collect.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # In a dry run, hand Claude ONLY read tools — it physically cannot edit,
          # comment, or create, so "log the plan" is enforced, not just requested.
          # A real run adds the issue-write verbs.
          claude_args: >-
            --model claude-sonnet-5 --max-turns 30 --allowedTools
            "${{ env.DRY_RUN == 'true'
              && 'Bash(gh issue list:*),Bash(gh issue view:*),Read'
              || 'Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue create:*),Read' }}"
          prompt: |
            You are the feedback-remediation triager. The fresh open issues to
            triage are in `issues.json` at the repo root (bot-authored and
            already-`triaged` issues are excluded). The in-TUI feedback form files
            issues with `[Bug]` / `[Feature]` / `[Improvement]` / `[Other]` title
            prefixes and `type:*` / `area:*` labels — treat the title prefix as a
            strong prior. Label vocabulary: type=bug/feature/improvement/other;
            area=analysis, planning, standup, retro, performance, reporting, usage,
            settings, general.

            DRY RUN: ${{ env.DRY_RUN }}. If this is `true`, DO NOT change anything —
            print, for each issue, the labels/comment you WOULD apply and why, then
            stop. (You have only read tools, so writes will fail anyway.)

            For each issue, on a REAL run:
            1. Cursor — add the `triaged` label (this is what stops it being
               re-processed tomorrow). Always do this, whatever the outcome below.
            2. Normalize — add a missing `type:*` label (infer from the title
               prefix) and a missing `area:*` label (infer from the body). Never
               remove existing labels.
            3. Route by your classification:
               - bug, actionable, and specific enough to implement -> add
                 `claude-implement` so the implement workflow opens a fix PR, BUT
                 apply it to AT MOST 3 issues this run (the most clearly actionable
                 ones). Any further actionable bugs get `feedback:fix-queued`
                 instead (they wait for a future run).
               - feature request -> `feature-candidate` (a human green-lights it).
               - question / too vague to act on -> post ONE comment asking for the
                 specific missing detail, then add `feedback:needs-info`.
               - not actionable feedback / noise -> `feedback:noise`. NEVER close
                 an issue.

            Be conservative with `claude-implement`: only well-specified,
            self-contained bugs where the fix is obvious. When unsure between
            implement and queue, queue it.

            DIGEST: if today is Monday (UTC) — check with `date -u +%u` returning 1
            — also create-or-update ONE issue titled exactly `Feedback digest`
            (find it with `gh issue list --search "Feedback digest in:title"
            --state open`). Body: counts by outcome this run, the issues sent to
            `claude-implement`, and the `feedback:fix-queued` backlog. On other
            days, skip the digest. Skip entirely on a dry run.
